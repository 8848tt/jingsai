services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-competition}
      POSTGRES_USER: ${POSTGRES_USER:-competition}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-competition}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-competition} -d ${POSTGRES_DB:-competition}"]
      interval: 3s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-competition}
      POSTGRES_USER: ${POSTGRES_USER:-competition}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-competition}
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,api,web}
    volumes:
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - media:/media:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  media:
